<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Theme Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="error-log" style="display:none; position:fixed; top:0; left:0; right:0; background:rgba(255,0,0,0.8); color:white; z-index:9999; padding:10px; font-size:12px; max-height:200px; overflow-y:auto;"></div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var el = document.getElementById('error-log');
      el.style.display = 'block';
      var p = document.createElement('p');
      p.textContent = msg + ' at ' + line + ':' + col;
      el.appendChild(p);
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('error-log');
      el.style.display = 'block';
      var p = document.createElement('p');
      p.textContent = 'Unhandled: ' + e.reason;
      el.appendChild(p);
    });
  </script>
  <div class="glow-bg"></div>
  
  <div class="app-container">
    <header class="app-header">
      <div class="agent-selector">
        <button id="btn-agent-codex" class="agent-btn active" data-agent="codex">Codex</button>
        <button id="btn-agent-antigravity" class="agent-btn" data-agent="antigravity">Antigravity</button>
      </div>

     <div class="status-bar card">
      <div class="status-item">
          <div class="status-value">
            <span id="agent-status-dot" class="dot"></span>
            <span id="agent-status-text">Checking...</span>
          </div>
        </div>
        
        <div class="status-item">
          <span id="cdp-port-text" class="status-value highlight">-</span>
        </div>
        
        <div class="status-item toggle-item">
          <label class="switch">
            <input type="checkbox" id="theme-enabled-toggle">
            <span class="slider round"></span>
          </label>
        </div>
       
      </div>
    </header>
    
    <main class="app-main">
      <div class="section-title">
      </div>
      
      <div id="themes-grid" class="themes-grid">
        <!-- Built-in and custom theme cards will be generated here -->
        
        <!-- Loading Placeholder -->
        <div class="loading-placeholder">Loading themes...</div>
      </div>
    </main>
    
  </div>

  <!-- Upload / Custom Theme Modal -->
  <div id="upload-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Upload Custom Background</h3>
        <button id="btn-close-modal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div id="drop-zone" class="drop-zone">
          <span class="drop-icon">📤</span>
          <p>Drag image here, or  <span class="browse-link">Browse Files</span></p>
          <span class="file-info">JPG, PNG supported, max 20MB</span>
          <input type="file" id="file-input" accept="image/png, image/jpeg" style="display: none;">
        </div>
        
        <div id="crop-area" class="crop-area" style="display: none;">
          <div class="crop-container">
            <img id="crop-image" src="" alt="To Crop">
            <div id="crop-box" class="crop-box"></div>
          </div>
          <div class="crop-controls">
            <div class="control-row">
              <label for="zoom-slider">Zoom:</label>
              <input type="range" id="zoom-slider" min="10" max="200" value="100">
            </div>
            <p class="crop-tip">💡 Tip: Drag on the image to adjust crop position.</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel-crop" class="btn btn-secondary" style="display: none;">Re-select</button>
        <button id="btn-save-crop" class="btn btn-primary" style="display: none;">Save & Apply</button>
      </div>
    </div>
  </div>
  <script src="bundle.js"></script>
</body>
</html>
