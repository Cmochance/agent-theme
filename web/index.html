<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Theme Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="error-log" style="display:none; position:fixed; top:0; left:0; right:0; background:rgba(255,0,0,0.8); color:white; z-index:9999; padding:10px; font-size:12px; max-height:200px; overflow-y:auto;"></div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var el = document.getElementById('error-log');
      el.style.display = 'block';
      var p = document.createElement('p');
      p.textContent = msg + ' at ' + line + ':' + col;
      el.appendChild(p);
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('error-log');
      el.style.display = 'block';
      var p = document.createElement('p');
      p.textContent = 'Unhandled: ' + e.reason;
      el.appendChild(p);
    });
  </script>
  <div class="glow-bg"></div>
  
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon">🎨</span>
        <div>
          <h1>Agent Theme Companion</h1>
          <p class="subtitle">让你的 Agent App 焕发个性色彩</p>
        </div>
      </div>
      
      <div class="status-bar card">
        <div class="status-item">
          <span class="status-label">Agent 应用</span>
          <div class="agent-selector">
            <button id="btn-agent-codex" class="agent-btn active" data-agent="codex">Codex</button>
            <button id="btn-agent-antigravity" class="agent-btn" data-agent="antigravity">Antigravity</button>
          </div>
        </div>
        
        <div class="status-item">
          <span class="status-label">Agent 状态</span>
          <div class="status-value">
            <span id="agent-status-dot" class="dot"></span>
            <span id="agent-status-text">检测中...</span>
          </div>
        </div>
        
        <div class="status-item">
          <span class="status-label">CDP 调试端口</span>
          <span id="cdp-port-text" class="status-value highlight">-</span>
        </div>
        
        <div class="status-item toggle-item">
          <span class="status-label">自动启动 Agent</span>
          <label class="switch">
            <input type="checkbox" id="auto-launch-toggle">
            <span class="slider round"></span>
          </label>
        </div>
        
        <div class="actions-group">
          <button id="btn-start-agent" class="btn btn-primary">启动 Agent</button>
          <button id="btn-restart-agent" class="btn btn-secondary">重启 Agent</button>
        </div>
      </div>
    </header>
    
    <main class="app-main">
      <div class="section-title">
        <h2>选择背景主题</h2>
        <div class="master-switch-area">
          <span class="switch-label">启用主题注入</span>
          <label class="switch">
            <input type="checkbox" id="theme-enabled-toggle">
            <span class="slider round"></span>
          </label>
        </div>
      </div>
      
      <div id="themes-grid" class="themes-grid">
        <!-- Built-in and custom theme cards will be generated here -->
        
        <!-- Loading Placeholder -->
        <div class="loading-placeholder">正在加载主题列表...</div>
      </div>
    </main>
    
    <footer class="app-footer">
      <div class="footer-status">
        <span class="footer-status-label">通知：</span>
        <span id="notification-text" class="notification-info">就绪</span>
      </div>
      <p class="copyright">Agent Theme Companion · Made with ❤️</p>
    </footer>
  </div>

  <!-- Upload / Custom Theme Modal -->
  <div id="upload-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>上传自定义背景</h3>
        <button id="btn-close-modal" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div id="drop-zone-one" class="drop-zone">
          <span class="drop-icon">📤</span>
          <p>拖拽图片到这里，或 <span class="browse-link">浏览文件</span></p>
          <span class="file-info">支持 JPG, PNG，最大 20MB</span>
          <input type="file" id="file-input" accept="image/png, image/jpeg" style="display: none;">
        </div>
        
        <div id="crop-area" class="crop-area" style="display: none;">
          <div class="crop-container">
            <img id="crop-image" src="" alt="To Crop">
            <div id="crop-box" class="crop-box"></div>
          </div>
          <div class="crop-controls">
            <div class="control-row">
              <label for="zoom-slider">缩放:</label>
              <input type="range" id="zoom-slider" min="10" max="200" value="100">
            </div>
            <p class="crop-tip">💡 提示：可以在图片上拖动以调整裁剪位置。</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel-crop" class="btn btn-secondary" style="display: none;">重新选择</button>
        <button id="btn-save-crop" class="btn btn-primary" style="display: none;">保存并应用</button>
      </div>
    </div>
  </div>
  <script src="bundle.js"></script>
</body>
</html>
